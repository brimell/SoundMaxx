name: SoundMaxx
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

targets:
  SoundMaxx:
    type: application
    platform: macOS
    sources:
      - SoundMaxx
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.SoundMaxx
        PRODUCT_NAME: SoundMaxx
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: SoundMaxx/Info.plist
        CODE_SIGN_ENTITLEMENTS: SoundMaxx/SoundMaxx.entitlements
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
    info:
      path: SoundMaxx/Info.plist
    entitlements:
      path: SoundMaxx/SoundMaxx.entitlements
